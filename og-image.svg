<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle grid lines for texture -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Logo mark — centered -->
  <g transform="translate(480, 160)">
    <circle cx="60" cy="60" r="56" stroke="#f5f5f4" stroke-width="3"/>
    <path d="M 36 42 A 30 30 0 0 1 84 42" stroke="#d4a574" stroke-width="3" stroke-linecap="round" fill="none"/>
    <line x1="60" y1="42" x2="60" y2="88" stroke="#f5f5f4" stroke-width="3" stroke-linecap="round"/>
    <circle cx="36" cy="42" r="4" fill="#d4a574"/>
    <circle cx="84" cy="42" r="4" fill="#d4a574"/>
    <circle cx="60" cy="88" r="4" fill="#f5f5f4"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="340" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="48" font-weight="500" fill="#f5f5f4" letter-spacing="-0.02em">Tola</text>

  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="22" fill="#a1a1aa" letter-spacing="0.02em">Full-stack AI systems for Irish business</text>

  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" fill="#71717a" letter-spacing="0.08em">tola.ie</text>

  <!-- Bottom accent line -->
  <rect x="540" y="580" width="120" height="2" rx="1" fill="#d4a574" opacity="0.5"/>
</svg>
